<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSense | Digital Twin</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="container-app">
        <div class="card-glass text-center">
            <p class="subtitle" style="margin-bottom: 5px;">Augmented Maintenance Guide</p>
            <h4 class="plant-name mb-4">{{ plant_name }}</h4>

            <div class="twin-container mb-4" style="border: 1px solid var(--border-glow); border-radius: 20px; overflow: hidden; position: relative;">
                <div class="scan-line"></div>
                <model-viewer 
                    src="{{ url_for('static', filename='models/' ~ plant_name|replace(' ', '_') ~ '.glb') }}"
                    ar ar-modes="webxr scene-viewer quick-look" 
                    camera-controls 
                    auto-rotate
                    style="width: 100%; height: 280px; background-color: #ffffff;">
                    
                    <div class="vitals-badge">
                        <span style="color: #86c29c; font-family: 'JetBrains Mono'; font-size: 0.6rem;"></span>
                    </div>
                </model-viewer>
            </div>

            <div class="row text-start mb-4">
                <div class="col-6">
                    <div class="section-title">Survival Prediction</div>
                    <div style="font-size: 1.4rem; font-weight: 600; font-family: 'JetBrains Mono';">{{ survival|int }}%</div>
                </div>
                <div class="col-6">
                    <div class="section-title">Suitability</div>
                    <div style="font-size: 1.4rem; font-weight: 600; font-family: 'JetBrains Mono'; color: var(--hum-color);">{{ score|int }}%</div>
                </div>
            </div>

            <div class="section-title text-start mb-2">Maintenance Insights</div>
            <ul class="actions">
                <li>3D Volume Analysis: <strong>Optimal</strong></li>
                <li>Foliage Density: <strong>High CO2 Absorption</strong></li>
                <li>Strategic Placement: <strong>Urban Corridor</strong></li>
            </ul>

            <a href="{{ url_for('controllers.main') }}" class="btn-main mt-4" style="border-color: var(--border-glow); color: var(--text-primary) !important;">
                Return to Telemetry
            </a>
        </div>
    </div>
</body>
</html>
