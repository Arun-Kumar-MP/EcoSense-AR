<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .card-custom {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .btn-ecosense {
            background: #00c853;
            border: none;
            font-size: 1.1rem;
            padding: 14px;
            border-radius: 50px;
            width: 100%;
            transition: 0.3s ease;
        }

        .btn-ecosense:hover {
            background: #00e676;
            transform: scale(1.02);
        }

        .plant-img {
            max-height: 220px;
            object-fit: contain;
        }

        .metric-card {
            background: rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .fade-in {
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>
<div class="app-container">
    <div class="card-custom text-center">

        <h2 class="mb-2">🌿 EcoSense</h2>
        <p class="text-light small">Smart Environmental Plant Advisor</p>

        <a href="#" id="captureBtn" class="btn btn-ecosense mt-3">
            Capture & Analyze
        </a>

        <script>
            document.getElementById("captureBtn").addEventListener("click", function(e) {
                e.preventDefault();
                let btn = this;
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Analyzing...';
                window.location.href = "{{ url_for('controllers.capture_and_recommend') }}";
            });
        </script>

        {% if recommendation %}
        <div class="mt-4 fade-in">

            <h4>Recommended Plant</h4>
            <h3 class="text-success">{{ recommendation }}</h3>

            <div class="mt-3">
                <img id="plantImage"
                     src="{{ url_for('static', filename='assets/' + recommendation|replace(' ', '_') + '.jpg') }}"
                     class="img-fluid plant-img rounded shadow">
            </div>

            <script>
                document.getElementById("plantImage").onerror = function() {
                    this.src = "{{ url_for('static', filename='assets/Placeholder.jpg') }}";
                };
            </script>

            <div class="mt-4 text-start">
                <div class="metric-card">🌡 Temperature: {{ avg_temp }} °C</div>
                <div class="metric-card">💧 Humidity: {{ avg_hum }} %</div>
                <div class="metric-card">🌫 Air Index: {{ avg_air }}</div>
                <div class="metric-card">☀ Light: {{ avg_lux }} lx</div>
            </div>

        </div>
        {% endif %}

    </div>
</div>
</body>
</html>
